<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conference Abstract</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* Base Styles & Centering */
        body {
            font-family: 'Lato', sans-serif;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* The Small Box */
        .abstract-container {
            max-width: 650px;
            width: 100%;
            padding: 50px;
            box-sizing: border-box;
            border: 1px solid #f0f0f0; /* Very subtle border to define the box */
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); /* Elegant, soft shadow */
            border-radius: 8px;
            margin: 20px;
        }

        /* Typography & Colors */
        h1.title {
            color: #3470BF;
            font-size: 26px;
            margin-top: 0;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .author {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .abstract-text {
            font-size: 16px;
            line-height: 1.7;
            margin-bottom: 40px;
        }

        /* References Section */
        .references {
            color: #808080;
            font-size: 14px;
            border-top: 1px solid #f0f0f0;
            padding-top: 20px;
        }

        .references h3 {
            font-size: 13px;
            color: #808080;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .references ul {
            padding-left: 20px;
            margin: 0;
        }

        .references li {
            margin-bottom: 10px;
            line-height: 1.5;
        }

        /* Mobile Adjustments (Edge to Edge) */
        @media (max-width: 600px) {
            body {
                align-items: flex-start; /* Push content to top */
            }
            .abstract-container {
                margin: 0;
                border: none;
                box-shadow: none;
                border-radius: 0;
                padding: 30px 20px; /* Standard mobile padding */
            }
        }
    </style>
</head>
<body>

    <div class="abstract-container">
        <img src="{{ site.baseurl }}/3Elogo.png" alt="3E Logo" style="display:block; margin:0 auto 40px auto; max-width:90px; width:100%;">
        {% if page.date %}
        <div style="text-align:center; margin-bottom:24px;">
            <span style="background-color:#d0e4f7; color:#3470BF; padding:6px 18px; border-radius:999px; font-size:14px; font-weight:700; letter-spacing:0.5px;">{{ page.date }}</span>
        </div>
        {% endif %}
        <h1 class="title">{{ page.title }}</h1>
        <div class="author">{{ page.author }}</div>
        
        <div class="abstract-text">
            {{ content }}
        </div>
        
        {% if page.references %}
        <div class="references">
            <h3>Bibliografia</h3>
            <ul>
                {% for ref in page.references %}
                <li>{{ ref }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}
    </div>

</body>
</html>
