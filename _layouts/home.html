<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efektywna, efektowna i etyczna komunikacja 5</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lato', sans-serif;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .home-container {
            max-width: 900px;
            width: 100%;
            padding: 50px 60px;
            box-sizing: border-box;
            border: 1px solid #f0f0f0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            border-radius: 8px;
            margin: 20px;
        }

        .home-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .home-header img {
            display: inline-block;
            max-width: 90px;
            width: 100%;
            margin-bottom: 30px;
        }

        h1 {
            color: #3470BF;
            font-size: 28px;
            margin: 0 0 8px 0;
            line-height: 1.2;
        }

        .home-header .subtitle {
            color: #808080;
            font-size: 16px;
            font-weight: 400;
        }

        h2 {
            color: #3470BF;
            font-size: 20px;
            margin-top: 40px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #d0e4f7;
        }

        h3 {
            color: #000000;
            font-size: 16px;
            font-weight: 700;
            margin-top: 24px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        ul {
            padding-left: 0;
            list-style: none;
            margin: 0 0 8px 0;
        }

        ul li {
            padding: 6px 0;
            font-size: 15px;
            line-height: 1.6;
        }

        ul li a {
            color: #3470BF;
            text-decoration: none;
        }

        ul li a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .home-container {
                margin: 0;
                border: none;
                box-shadow: none;
                border-radius: 0;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="home-container">
        <div class="home-header">
            <img src="{{ site.baseurl }}/3Elogo.png" alt="3E Logo">
            <h1>{{ page.title }}</h1>
            <div class="subtitle">{{ page.subtitle }}</div>
        </div>

        {{ content }}
    </div>

</body>
</html>
